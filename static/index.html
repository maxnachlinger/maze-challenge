<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Maze Generator</title>
</head>
<body>
<h1>Maze challenge checker!</h1>
<div>
    <p>Current maze:</p>
    <canvas style="background-color: white" id="mazeCanvas"></canvas>
</div>
<p>
    Paste a maze definition:
</p>
<div><textarea id="mazeDefinitionTextarea" style="width: 400px; height: 150px;"></textarea></div>
<div>
    <button id="updateMazeButton">Update maze</button>
</div>

<p>Or</p>

<div><a id="downloadMazeLink">download current maze definition</a></div>

<h2>Solution</h2>
<p>Paste you solution here as an array of <code>{ row: 0, col: 0 }</code> objects.</p>
<textarea id="solutionTextarea" style="width: 400px; height: 150px;"></textarea>
<div id="solutionResultsDiv" style="display: none"></div>
<div>
    <button id="testSolutionButton">Test Solution</button>
</div>
<script src="index.js"></script>
</body>
</html>
