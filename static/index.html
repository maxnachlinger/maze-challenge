<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Maze Generator</title>
</head>
<body>
<h1>Maze challenge checker!</h1>
<div>
    <a href="#" id="generateMaze">Generate a maze</a>
    <a id="downloadMaze">Download generated maze</a>
</div>
<canvas style="background-color: white" id="mazeCanvas"></canvas>
<div>
  <h2>Solution</h2>
  <p>Paste you solution here as an array of <code>{ row: 0, col: 0 }</code> objects.</p>
  <textarea id="solutionText" style="width: 400px; height: 150px;"></textarea>
</div>
<div>
  <button id="testSolution">Test Solution</button>
</div>
<script src="index.js"></script>
</body>
</html>
